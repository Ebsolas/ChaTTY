<!doctype html>
<html lang="en" style="background:#0f1115;color-scheme:dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Chatty</title>
    <!-- Critical paint: avoid white flash before CSS/JS load (esp. Tauri webview) -->
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0f1115;
        color: #e8eaed;
        color-scheme: dark;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="background:#0f1115;color:#e8eaed">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
