<!doctype html>
<html lang="en" style="background:#0f1115;color-scheme:dark;height:100%;overflow:hidden">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Chatty</title>
    <!-- Critical paint + layout lock for Tauri/WebKitGTK (no white flash, no off-screen chrome) -->
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        max-height: 100%;
        overflow: hidden;
        background: #0f1115;
        color: #e8eaed;
        color-scheme: dark;
      }
      /* Real box (not display:contents) so % height works through SvelteKit */
      #app-root {
        width: 100%;
        height: 100%;
        max-height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="background:#0f1115;color:#e8eaed;height:100%;overflow:hidden">
    <div id="app-root">%sveltekit.body%</div>
  </body>
</html>
