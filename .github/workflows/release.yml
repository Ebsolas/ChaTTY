name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libfuse2 \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build AppImage (+ deb when available)
        run: npm run tauri:build
        env:
          # Avoid interactive prompts; CI is headless.
          CI: true
          # Run AppImage tooling without FUSE mount (common on runners).
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -print -exec cp -v {} dist-release/ \;
          ls -lah dist-release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatty-linux-x86_64
          path: dist-release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: chatty-linux-x86_64
          path: dist-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Chatty ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: dist-release/*
          body: |
            ## Chatty ${{ github.ref_name }}

            Conversational terminal — Discord-style chat over local shell sessions (Tauri 2 + SvelteKit).

            ### Download (Linux x86_64)

            | File | Notes |
            |------|--------|
            | `*.AppImage` | **Recommended** — no install; run in place |
            | `*.deb` | Debian/Ubuntu package |

            **AppImage**
            ```bash
            chmod +x Chatty_*.AppImage
            ./Chatty_*.AppImage
            ```
            On some desktops you may need “Allow launching” / “Execute” in file properties.

            The AppImage includes **chatty-host** (durable session backend). Sessions keep running if you quit the UI and relaunch.

            ### Highlights
            - Multi-session chat + full session terminal views
            - Groups, conversations, and sessions rails
            - Durable PTY host (`chatty-host`)
            - Keyboard focus regions, jump palette (`Alt+P`), resizable rails

            ### Develop from source
            ```bash
            npm install
            npm run tauri dev
            # release build with host sidecar:
            npm run tauri:build
            ```

            Windows installers are not in this release yet.
